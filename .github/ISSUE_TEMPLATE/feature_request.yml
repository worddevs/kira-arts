name: Feature Request
description: Suggest an idea or improvement for kira-arts
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: e.g. "It would be useful to customize X because..."

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've thought about solving this.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples from other libraries, screenshots, etc.
